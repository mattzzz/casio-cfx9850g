<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Casio CFX-9850G</title>
  <link rel="stylesheet" href="/static/css/calculator.css">
  <link rel="stylesheet" href="/static/css/screen.css">
</head>
<body>
<div id="calc-body">

  <!-- Brand -->
  <div id="brand-top">
    <span id="brand-casio">CASIO</span>
    <span id="brand-model">32KB ◆</span>
  </div>

  <!-- Screen -->
  <div id="screen-bezel">
    <canvas id="lcd" width="384" height="192"></canvas>
  </div>

  <!-- Sub-brand -->
  <div id="brand-sub">
    <span id="brand-color">COLOR POWER GRAPHIC</span>
    <span id="brand-cfx">CFX-9850G</span>
  </div>

  <!-- ── Keyboard ────────────────────────────────────────────────────── -->
  <div id="keyboard">

    <!-- F-key labels row -->
    <div id="fkey-labels">
      <span>Trace</span><span>Zoom</span><span>V-Window</span>
      <span>Sketch</span><span>G-Solv</span><span>G-T</span>
    </div>

    <!-- F-keys -->
    <div class="krow">
      <button class="key kf" data-key="F1">F1</button>
      <button class="key kf" data-key="F2">F2</button>
      <button class="key kf" data-key="F3">F3</button>
      <button class="key kf" data-key="F4">F4</button>
      <button class="key kf" data-key="F5">F5</button>
      <button class="key kf" data-key="F6">F6</button>
    </div>

    <!-- Upper grid: SHIFT row + ALPHA row + d-pad spanning both rows
         Grid: 4 equal cols + 1 dpad col (2× width) = 6 units wide
         Matches the 6-key function rows below. -->
    <div id="upper-grid">

      <!-- Row 1 of grid: SHIFT OPTN VARS MENU -->
      <button class="key kdark" id="key-SHIFT" data-key="SHIFT">
        <span class="slbl">SHIFT</span>
      </button>
      <button class="key kdark" data-key="OPTN">
        <span class="ylbl">PRGM</span>
        <span class="slbl">OPTN</span>
      </button>
      <button class="key kdark" data-key="VARS">
        <span class="ylbl">SET UP</span>
        <span class="slbl">VARS</span>
      </button>
      <button class="key kdark" data-key="MENU">
        <span class="slbl">MENU</span>
      </button>

      <!-- D-pad: spans both rows in column 5 -->
      <div id="dpad">
        <div></div>
        <button class="key knav" data-key="UP">▲</button>
        <div></div>
        <button class="key knav" data-key="LEFT">◄</button>
        <div></div>
        <button class="key knav" data-key="RIGHT">►</button>
        <div></div>
        <button class="key knav" data-key="DOWN">▼</button>
        <div></div>
      </div>

      <!-- Row 2 of grid: ALPHA x² ^ EXIT -->
      <button class="key kalpha" id="key-ALPHA" data-key="ALPHA">
        <span class="ylbl">A-LOCK</span>
        <span class="slbl">ALPHA</span>
      </button>
      <button class="key kdark" data-key="SQR">
        <span class="ylbl">√</span>
        <span class="slbl">x²</span>
      </button>
      <button class="key kdark" data-key="POW">
        <span class="ylbl">Γ</span>
        <span class="slbl">^</span>
      </button>
      <button class="key kdark" data-key="EXIT">
        <span class="ylbl">QUIT</span>
        <span class="slbl">EXIT</span>
      </button>

    </div><!-- /upper-grid -->

    <!-- Row: X,θ,T  log  ln  sin  cos  tan -->
    <div class="krow">
      <button class="key kdark" data-key="XTHETA">
        <span class="rlbl">A</span>
        <span class="slbl">X,θ,T</span>
      </button>
      <button class="key kfunc" data-key="LOG">
        <span class="ylbl">10ˣ</span>
        <span class="rlbl">B</span>
        <span class="slbl">log</span>
      </button>
      <button class="key kfunc" data-key="LN">
        <span class="ylbl">eˣ</span>
        <span class="rlbl">C</span>
        <span class="slbl">ln</span>
      </button>
      <button class="key kfunc" data-key="SIN">
        <span class="ylbl">sin⁻¹</span>
        <span class="rlbl">D</span>
        <span class="slbl">sin</span>
      </button>
      <button class="key kfunc" data-key="COS">
        <span class="ylbl">cos⁻¹</span>
        <span class="rlbl">E</span>
        <span class="slbl">cos</span>
      </button>
      <button class="key kfunc" data-key="TAN">
        <span class="ylbl">tan⁻¹</span>
        <span class="rlbl">F</span>
        <span class="slbl">tan</span>
      </button>
    </div>

    <!-- Row: ab/c  F→D  (  )  ,  → -->
    <div class="krow">
      <button class="key kdark" data-key="FRAC">
        <span class="ylbl">d/c</span>
        <span class="rlbl">G</span>
        <span class="slbl">ab/c</span>
      </button>
      <button class="key kdark" data-key="FD">
        <span class="ylbl">√</span>
        <span class="rlbl">H</span>
        <span class="slbl">F→D</span>
      </button>
      <button class="key kdark" data-key="LPAREN">
        <span class="ylbl">x⁻¹</span>
        <span class="rlbl">I</span>
        <span class="slbl">(</span>
      </button>
      <button class="key kdark" data-key="RPAREN">
        <span class="ylbl">x⁻¹</span>
        <span class="rlbl">J</span>
        <span class="slbl">)</span>
      </button>
      <button class="key kdark" data-key="COMMA">
        <span class="rlbl">K</span>
        <span class="slbl">,</span>
      </button>
      <button class="key kdark" data-key="ARROW">
        <span class="rlbl">L</span>
        <span class="slbl">→</span>
      </button>
    </div>

    <!-- Row: 7  8  9  DEL  AC/ON -->
    <div class="krow">
      <button class="key knum" data-key="7"><span class="rlbl">M</span><span class="nlbl">7</span></button>
      <button class="key knum" data-key="8"><span class="rlbl">N</span><span class="nlbl">8</span></button>
      <button class="key knum" data-key="9"><span class="rlbl">O</span><span class="nlbl">9</span></button>
      <button class="key knum" data-key="DEL">
        <span class="ylbl">INS</span>
        <span class="slbl" style="font-size:11px">DEL</span>
      </button>
      <button class="key knum kac" data-key="AC">
        <span class="ylbl">OFF</span>
        <span class="slbl kac-lbl">AC/ON</span>
      </button>
    </div>

    <!-- Row: 4  5  6  ×  ÷ -->
    <div class="krow">
      <button class="key knum" data-key="4"><span class="rlbl">P</span><span class="nlbl">4</span></button>
      <button class="key knum" data-key="5"><span class="rlbl">Q</span><span class="nlbl">5</span></button>
      <button class="key knum" data-key="6"><span class="rlbl">R</span><span class="nlbl">6</span></button>
      <button class="key knum" data-key="MUL"><span class="rlbl">S</span><span class="nlbl">×</span></button>
      <button class="key knum" data-key="DIV"><span class="rlbl">T</span><span class="nlbl">÷</span></button>
    </div>

    <!-- Row: 1  2  3  +  − -->
    <div class="krow">
      <button class="key knum" data-key="1"><span class="rlbl">U</span><span class="nlbl">1</span></button>
      <button class="key knum" data-key="2"><span class="rlbl">V</span><span class="nlbl">2</span></button>
      <button class="key knum" data-key="3"><span class="rlbl">W</span><span class="nlbl">3</span></button>
      <button class="key knum" data-key="PLUS"><span class="rlbl">X</span><span class="nlbl">+</span></button>
      <button class="key knum" data-key="MINUS"><span class="rlbl">Y</span><span class="nlbl">−</span></button>
    </div>

    <!-- Row: 0  .  EXP  (−)  EXE -->
    <div class="krow">
      <button class="key knum" data-key="0"><span class="rlbl">Z</span><span class="nlbl">0</span></button>
      <button class="key knum" data-key="DOT"><span class="nlbl">.</span></button>
      <button class="key knum" data-key="EXP">
        <span class="rlbl">π</span>
        <span class="slbl" style="font-size:10px">EXP</span>
      </button>
      <button class="key knum" data-key="NEG">
        <span class="rlbl">Ans</span>
        <span class="slbl" style="font-size:10px">(−)</span>
      </button>
      <button class="key kexe" data-key="EXE"><span class="nlbl">EXE</span></button>
    </div>

  </div><!-- /keyboard -->
</div><!-- /calc-body -->

<script src="/static/js/display.js?v=4"></script>
<script src="/static/js/keyboard.js?v=4"></script>
<script src="/static/js/modes.js?v=4"></script>
<script src="/static/js/graph.js?v=4"></script>
<script src="/static/js/app.js?v=4"></script>
</body>
</html>
